{% macro language_selector(use_flag_icon=true) %}
{% for Translation in page.translations %}
<div class="flagster" style="float: right; padding: 5px">
  <a href="{{Translation.permalink}}" title="Change language to {{Translation.lang}}" id="lang-{{Translation.lang}}">
    {% if use_flag_icon %}
    <img src="/icons/{{trans(key='flag', lang=Translation.lang)}}" width="28" alt="Change language to {{Translation.lang}}" />
    {% else %}
    {{trans(key="flag", lang=Translation.lang)}}
    {% endif %}
  </a>
</div>
{% endfor %}
{% endmacro %}
